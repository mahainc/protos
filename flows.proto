syntax = "proto3";

package asyncify.flows;

import "google/protobuf/struct.proto";
import "types.proto";

option swift_prefix = "Asyncify";

message Options {
  bool premium = 1;
  string content_type = 2;
  string bundle_id = 3;
  string device_id = 4;
  string country_code = 5;
  string language_code = 6;
  string region_code = 7;
  // app version
  string app_version = 8;
  // extra arguments
  // api_key embedded in sdk
  google.protobuf.Struct extra = 9;
  string platform = 10;
  // user id
  string uid = 11;
  // Device timezone offset in hours east of UTC. Threaded through the
  // platform JWT as the `tz` claim.
  int64 tz = 12;
}

message Cookie {
  optional string domain = 1;
  optional string path = 2;
  string name = 3;
  string value = 4;
  optional string secure = 5;
}

message Action {
  message HTTP {
    message Part {
      string field = 1;
      string value = 2;
      optional string filename = 3;
    }
    string url = 1;
    map<string, string> headers = 2;
    string method = 3;
    asyncify.types.Bytes body = 4;
    repeated Cookie cookies = 5;
    repeated Part multiparts = 6;
  }
  message WebSocket {
    enum FrameType {
      UNSPECIFIED = 0;
      BINARY = 1;
      TEXT = 2;
    }
    string url = 1;
    map<string, string> headers = 2;
    asyncify.types.Bytes body = 3;
    FrameType frame_type = 4;
  }
  message Regex {
    asyncify.types.String input = 1;
    string pattern = 2;
    repeated int32 groups = 3;
  }
  message JavaScript {
    message Eval {
      string fn = 1;
      repeated FieldEntry args = 2;
    }
    string src = 1;
    oneof action {
      Eval eval = 2;
    }
  }
  message FileDescriptor {
    message Write {
      asyncify.types.Bytes data = 1;
      optional string enc = 2;
      bool append = 3;
    }
    message Read {
      optional string enc = 1;
    }
    message Metadata {}
    message Delete {}
    message Mkdir {}
    message Move {
      string to = 1;
    }
    string url = 1;
    oneof action {
      Write write = 2;
      Read read = 3;
      Metadata metadata = 4;
      Delete delete = 5;
      Mkdir mkdir = 6;
      Move move = 7;
    }
  }
  message SSE {
    string url = 1;
    map<string, string> headers = 2;
    asyncify.types.Bytes body = 3;
    string method = 4;
  }
  string id = 1;
  oneof action {
    HTTP http = 2;
    WebSocket ws = 3;
    Regex regex = 4;
    JavaScript js = 5;
    FileDescriptor fd = 6;
    SSE sse = 7;
  }
}

message FieldEntry {
  enum Type {
    UNSPECIFIED = 0;
    BOOL = 1;
    INT = 2;
    DOUBLE = 3;
    STRING = 4;
  }
  Type type = 1;
  string value = 2;
}

message Command {
  enum Kind {
    CALL = 0;
    SYNC = 1;
    EVENT = 2;
    DELEGATE = 3;
  }
  message Call {
    string id = 1;
    google.protobuf.Struct args = 2;
  }
  message Sync {
    message HTTP {
      asyncify.types.Bytes body = 1;
      map<string, string> headers = 2;
      repeated Cookie cookies = 3;
      int32 code = 4;
    }
    message WebSocket {
      asyncify.types.Bytes body = 1;
      map<string, string> headers = 2;
      repeated Cookie cookies = 3;
      int32 code = 4;
    }
    message Regex {
      message Match {
        int32 start = 1;
        int32 end = 2;
      }
      Match main = 1;
      map<int32, Match> groups = 2;
    }
    message JavaScript {
      oneof data {
        string eval = 1;
      }
    }
    message FileDescriptor {
      int32 status = 1;
      google.protobuf.Struct metadata = 2;
      asyncify.types.Bytes content = 3;
    }
    message SSE {
      asyncify.types.Bytes data = 1;
      string event = 2;
      string id = 3;
      int32 code = 4;
      bool done = 5;
    }
    oneof action {
      HTTP http = 1;
      WebSocket ws = 2;
      Regex regex = 3;
      JavaScript js = 4;
      FileDescriptor fd = 5;
      SSE sse = 6;
    }
  }
  message Event {
    enum Kind {
      ERROR = 0;
    }
    message Error {
      int32 code = 1;
      string reason = 2;
    }
    Kind kind = 1;
    oneof data {
      Error error = 2;
    }
  }
  Options options = 1;
  Kind kind = 2;
  string request_id = 3;
  oneof data {
    Call call = 4;
    Sync sync = 5;
    Event event = 6;
    Action delegate = 7;
  }
}
