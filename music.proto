syntax = "proto3";

package asyncify.music;

import "google/protobuf/struct.proto";

option swift_prefix = "Music";

message Options {
  string provider = 1;
}

message ListOptions {
  message Discover {
    repeated Entry categories = 1;
  }
  message Search {
    repeated string scopes = 1;
  }
  repeated Entry providers = 1;
  Discover discover = 2;
  Search search = 3;
}

message Entry {
  string id = 1;
  string name = 2;
}

message TrackDetails {
  message Format {
    string id = 1;
    string url = 2;
    optional string quality = 3;
    google.protobuf.Struct metadata = 4;
    optional string mime_type = 5;
    // expiry time (epoch time)
    optional int64 exp = 6;
  }
  string id = 1;
  string title = 2;
  string description = 3;
  Author author = 4;
  repeated Format formats = 5;
  optional string thumbnail = 6;
  double duration = 7;
  int32 views = 8;
  optional string dash_manifest_url = 9;
  optional string hls_manifest_url = 10;
  repeated Track related_tracks = 11;
}

message Transcript {
  message Segment {
    string text = 1;
    int32 offset = 2;
    int32 duration = 3;
  }
  repeated Segment segments = 1;
}

message Author {
  string id = 1;
  string name = 2;
  optional string thumbnail = 3;
}

message Track {
  string id = 1;
  string title = 2;
  string kind = 3;
  Author author = 4;
  optional string thumbnail = 5;
  string page_src = 6;
}

message ListTracks {
  repeated Track items = 1;
  optional string continuation = 2;
  google.protobuf.Struct metadata = 3;
}

message ListSuggestions {
  repeated string suggestions = 1;
}

