// All possible fields for generate actions. Providers consume a
// subset based on each process type's supported_fields.
//
// Enum-shaped fields (room_style, room_type, color, surface_type,
// style_selection) are proto-typed — the proto schema is the single
// source of truth for the enum universe; each plugin advertises a
// subset via the `supported_*(pt)` trait methods. SwiftProtobuf
// JSON-encodes these as the value name in SCREAMING_SNAKE_CASE
// (e.g. "MODERN", "LIVING_ROOM", "MILLENNIAL_GRAY"); the Rust
// executor reads that name from the args bag and resolves it through
// `enum_names`. Callers pass the typed enum case directly on the
// Swift API surface — no PascalCase round-trip.
message GenerateRequest {
  asyncify.types.BaseRequest base = 1;
  // Source image — `file://` URL of a local capture, or `http(s)://`.
  string file = 2;
  // Target interior style for the redesign.
  RoomStyle room_style = 3;
  // Target room/space type the redesign targets.
  RoomType room_type = 4;
  // Free-text prompt / extra direction for the provider.
  string prompt = 5;
  // Color palette — only relevant for the Paint process type.
  ColorPalette color = 6;
  // Mask file URL — only for Paint / Replace.
  string mask = 7;
  // Surface to repaint — only for Paint.
  SurfaceType surface_type = 8;
  // Reference image URL — only for the Reference process type.
  string ref_image = 9 [json_name="ref_image"];
  // Provider-specific structural/renovation toggle for Interior.
  StyleSelection style_selection = 10;
}

// Wrapped in task.Task.value as Any
message GenerateResult {
  asyncify.types.Image result = 1;
  asyncify.types.Image input = 2;
  RoomStyle room_style = 3;
  RoomType room_type = 4;
  ProcessType process_type = 5;
}

// Homedecor actions reachable via gRPC-style method names. Each rpc
// maps 1:1 to a `generate::Builder` registered for that process
// type — same `FnConsumer` as the legacy UUID action_id path.
service HomedecorService {
  // Full radical interior redesign.
  rpc Interior(GenerateRequest) returns (GenerateResult);
  // Facade material swap.
  rpc Exterior(GenerateRequest) returns (GenerateResult);
  // Landscape/vegetation redesign.
  rpc Garden(GenerateRequest) returns (GenerateResult);
  // Paint walls/surfaces (mask + color required).
  rpc Paint(GenerateRequest) returns (GenerateResult);
  // Replace masked objects with prompt-described items.
  rpc Replace(GenerateRequest) returns (GenerateResult);
  // Floor material swap.
  rpc Floor(GenerateRequest) returns (GenerateResult);
  // Restyle using a reference image (ref_image required).
  rpc Reference(GenerateRequest) returns (GenerateResult);
  // Add furniture + decor to empty rooms.
  rpc Staging(GenerateRequest) returns (GenerateResult);
  // Remove clutter + clean.
  rpc Declutter(GenerateRequest) returns (GenerateResult);
  // 2D floor plan from a photo.
  rpc FloorPlan(GenerateRequest) returns (GenerateResult);
  // Render a 2D floor plan as a photorealistic interior.
  rpc PlanToImage(GenerateRequest) returns (GenerateResult);
}

