syntax = "proto3";

package asyncify.vision;

import "google/protobuf/struct.proto";
import "codegen.proto";

option swift_prefix = "Vision";

message ScanRequest {
  // image file URI (file://) or URL (https://)
  string file = 1;
  // scan category (default: "object")
  optional string category = 2;
  // localization language (default: "en")
  optional string language = 3;
  // custom analysis prompt
  optional string prompt = 4;
  // user latitude (WGS84) — passed to providers that condition results
  // on local climate (plant identification under PictureThis-family
  // backends adjusts for hardiness zone, similar-species ranking, etc.)
  optional double latitude = 5;
  // user longitude (WGS84) — see latitude
  optional double longitude = 6;
}

message ScanResult {
  // AI-generated description/analysis
  string description = 1;
  // follow-up questions
  repeated string suggested_questions = 2;
  // identified object title
  optional string title = 3;
  // detected category
  optional string category_type = 4;
  // uploaded image URL
  optional string image_url = 5;
  // key-value characteristics
  Characteristics characteristics = 6;
  // food scans
  NutritionInfo nutrition = 7;
  // coin/stone scans
  PhysicalFeatures physical = 8;
  // market value
  PriceInfo price = 9;
  // related products/links
  repeated ShoppingProduct discover_more = 10;
  // purchase links
  repeated Link buy_now = 11;
  // reference sources
  repeated Link sources = 12;
  // AI insights
  AICommentary ai_commentary = 13;
  // category-specific info block
  CategoryInfo category_info = 14;
  // raw JSON response
  optional string raw = 15;
  // confidence of this result (0..1) — set when the source ranked candidates
  optional double probability = 16;
  // additional ranked candidates below the top result (each carries its own probability)
  repeated ScanResult alternatives = 17;
  // server-curated key/value facts (display label → joined values). The
  // label is already localized server-side. Example for a plant: Sunlight
  // → "Partial sun", Bloom Time → "Spring · Summer". Agnostic across
  // vision domains (plants/coins/food). When a fact has multiple values,
  // the provider joins them with " · ".
  map<string, string> facts = 18;
  // lookalike candidates the user shouldn't confuse this with (provider-
  // populated when available). Each entry is a thin ScanResult with at
  // least title + imageUrl set.
  repeated ScanResult confusions = 19;
}

message Characteristics {
  // key-value pairs
  map<string, string> fields = 1;
}

message NutritionInfo {
  optional string kcal = 1;
  optional string calories = 2;
  optional string protein = 3;
  optional string carbs = 4;
  optional string fat = 5;
  optional string shelf_life = 6 [json_name="shelf_life"];
  optional string freshness = 7;
}

message PhysicalFeatures {
  optional string weight = 1;
  optional string diameter = 2;
  optional string thickness = 3;
  optional string edge = 4;
  optional string composition = 5;
  optional string mintage = 6;
  optional string years_of_minting = 7 [json_name="years_of_minting"];
  optional string grade = 8;
  optional string krause_number = 9 [json_name="krause_number"];
  optional string issuer = 10;
  optional string rarity = 11;
  optional string hardness_scale = 12 [json_name="hardness_scale"];
  optional string density = 13;
  optional string crystal_system = 14 [json_name="crystal_system"];
  optional string luster = 15;
  optional string formula = 16;
  optional string color = 17;
}

message PriceInfo {
  optional string average_fair_market_price = 1 [json_name="average_fair_market_price"];
  optional string web_purchase_url = 2;
}

message Link {
  optional string title = 1;
  optional string url = 2;
  optional string description = 3;
  optional string image = 4;
}

message AICommentary {
  optional string ai_assistant_says = 1 [json_name="ai_assistant_says"];
  optional string ai_suggests = 2 [json_name="ai_suggests"];
  optional string expert_insights = 3 [json_name="expert_insights"];
  optional string recommendation = 4;
  optional string interesting_facts = 5 [json_name="interesting_facts"];
  optional string learn_more = 6 [json_name="learn_more"];
  optional string real_or_fake = 7 [json_name="real_or_fake"];
  optional string market_demand = 8 [json_name="market_demand_and_value_analysis"];
}

message CategoryInfo {
  // info block type (coinInfo, foodInfo, etc.)
  string type = 1;
  // category-specific fields
  map<string, string> fields = 2;
  // nested structured data
  google.protobuf.Struct metadata = 3;
}

message ShoppingProduct {
  optional string title = 1;
  optional string price = 2;
  optional string currency = 3;
  optional string url = 4;
  optional string image = 5;
  // e.g. "google", "amazon"
  optional string source = 6;
  optional double rating = 7;
  optional int32 reviews_count = 8 [json_name="reviews_count"];
}

message ShoppingResult {
  repeated ShoppingProduct products = 1;
  // search query used
  optional string query = 2;
}

message VideoResult {
  optional string title = 1;
  optional string url = 2;
  optional string thumbnail = 3;
  // e.g. "youtube"
  optional string source = 4;
  optional string duration = 5;
}

message RecipeResult {
  optional string title = 1;
  optional string url = 2;
  optional string image = 3;
  optional string source = 4;
  optional string cook_time = 5 [json_name="cook_time"];
  optional double rating = 6;
}

message DiscoverResult {
  repeated ShoppingProduct products = 1;
  repeated VideoResult videos = 2;
  repeated RecipeResult recipes = 3;
  repeated Link related_links = 4 [json_name="related_links"];
}

message ExtendedScanResult {
  // base scan result
  ScanResult scan = 1;
  // buy now products
  ShoppingResult shopping = 2;
  // related content
  DiscoverResult discover = 3;
}

message ScanHistoryItem {
  string id = 1;
  string title = 2;
  optional string category_type = 3;
  optional string image_url = 4;
  optional string thumbnail = 5;
  optional int64 created_at = 6;
}

message ScanHistoryList {
  repeated ScanHistoryItem items = 1;
}

// =====================================================================
// Typed request envelopes — no BaseRequest (Rust picks the provider).
// =====================================================================

message VisualSearchRequest {
  // Image URL (file:// or http(s)://) to visually match.
  string file = 1;
}

message ShoppingRequest {
  // Free-text query — searches the configured shopping endpoint.
  string query = 1;
}

message DescribeRequest {
  // Image URL to caption / describe.
  string file = 1;
  // Optional scan category for context (e.g. "object", "food").
  string category = 2;
}

// =====================================================================
// Plant-domain follow-up RPCs — care advice after a plant has been
// identified via Scan (category="plant"). Each request typically carries
// a plant_id resolved by a prior Scan; the image is optional context.
// =====================================================================

message WaterCalcRequest {
  // image of the plant (file:// or https://); optional when plant_id is set
  optional string file = 1;
  // previously-resolved plant id (from a prior Scan); provider-agnostic string
  optional string plant_id = 2;
  // pot / placement / light / soil settings as provider-specific JSON;
  // omit for "I don't know" — provider picks a sensible default
  optional string settings = 3;
  // ISO country code (default "US")
  optional string country_code = 4;
  // user latitude (WGS84) — climate-aware care recommendation; optional
  optional double latitude = 5;
  // user longitude (WGS84) — climate-aware care recommendation; optional
  optional double longitude = 6;
}

message WaterCalcResult {
  // recommended water amount per watering, in millilitres
  optional double water_amount_ml = 1;
  // watering cadence, in days between waterings
  optional int32 frequency_days = 2;
  // care category (e.g. "low_water", "moderate", "high_water", "seasonal")
  optional string care_type = 3;
  // identified plant common name (echo from provider)
  optional string plant_name = 4;
  // identified plant latin name (echo from provider)
  optional string latin_name = 5;
  // plant id echoed for chaining follow-up calls; provider-agnostic string
  optional string plant_id = 6;
  // raw JSON response (provider-specific extras: FAQ blocks, etc.)
  optional string raw = 7;
}

message RepottingCheckerRequest {
  // image of the plant (must show both plant and pot)
  string file = 1;
  // previously-resolved plant id; optional, provider-agnostic string
  optional string plant_id = 2;
  // user-visible name of the plant. When set, the provider substitutes
  // it for the CMS placeholder (e.g. `__YOUR_PLANT_NAME__`) in returned
  // markdown guidance so the user sees their plant's name inline.
  optional string plant_name = 3;
}

message RepottingCheckerResult {
  // true when the image shows a recognised plant
  bool is_plant = 1;
  // true when the species is one repotting advice applies to
  // (false for outdoor / ground species)
  bool is_repottable = 2;
  // status hint (e.g. "no_pot_detected") when the engine couldn't analyse
  // the photo; empty when topics[] is populated
  optional string status = 3;
  // structured repotting guidance — one entry per topic (preparation,
  // tools, post-care, etc.). Each section is a titled markdown blurb.
  repeated RepotTopic topics = 4;
  // raw JSON response (provider-specific extras)
  optional string raw = 5;
}

message RepotTopic {
  // human-readable topic name (e.g. "Preparation", "Tools", "Aftercare")
  string name = 1;
  // titled markdown sections inside the topic
  repeated RepotTopicSection sections = 2;
}

message RepotTopicSection {
  // section heading (e.g. "How to repot")
  optional string title = 1;
  // markdown body content
  string content = 2;
}

message LightMeterRequest {
  // captured camera brightness (provider-defined units, e.g. AVFoundation
  // exposure-based lux estimate); set when measured on-device
  optional double brightness = 1;
  // optional image to classify when brightness isn't available
  optional string file = 2;
}

message LightMeterResult {
  // bucket label (e.g. "low_light", "medium_light", "bright_light")
  string level = 1;
  // estimated lux value
  optional double lux = 2;
}

// Disease detection details for one diagnosed disease on a plant.
message DiseaseInfo {
  // common name e.g. "Brown Spot"
  optional string name = 1;
  // probable causes (e.g. "Poor ventilation", "Disease infected")
  repeated string causes = 2;
  // one-line treatment summary
  optional string summary = 3;
  // treatment / remediation steps (may be i18n keys or display strings)
  repeated string treatments = 4;
  // detection confidence 0..1
  optional double confidence = 5;
  // normalized bounding box in the image: [x1, y1, x2, y2] in 0..1
  repeated double bbox = 6;
}

message DiagnoseRequest {
  // image of the plant
  string file = 1;
  // previously-resolved plant id (from a prior Scan); optional
  optional string plant_id = 2;
  // ISO country code (default "US")
  optional string country_code = 3;
  // user latitude (WGS84); when set, the diagnosis engine factors in
  // local climate (humidity, rainfall) for the verdict
  optional double latitude = 4;
  // user longitude (WGS84); see latitude
  optional double longitude = 5;
}

message DiagnoseResult {
  // identified plant common name (echo from provider)
  optional string plant_name = 1;
  // identified plant latin name (echo from provider)
  optional string latin_name = 2;
  // detected diseases — empty when the plant looks healthy
  repeated DiseaseInfo diseases = 3;
  // high-level scene labels (e.g. care_situation="bad_care") with their
  // top-1 probability per bucket
  map<string, string> scene = 4;
  // raw JSON envelope (provider-specific extras: care schedule, etc.)
  optional string raw = 5;
  // 12-month care schedule (one entry per calendar month, empty when the
  // provider doesn't expose one)
  repeated CareSchedule care_schedule = 6;
  // seasonal care tips ("Pruning time? …") — short titled blurbs
  repeated Tip tips = 7;
  // plant id minted by the provider for follow-up calls (insight,
  // water_calc, etc.); empty when the provider didn't return one
  optional string plant_id = 8;
  // optional reference image of a healthy version of the same species
  optional string health_image_url = 9;
}

// One month's care schedule. `care_list` is a small map of care kind
// label → cadence. The provider may emit -1 for "not applicable this
// month" (e.g. fertilize in winter) — UIs should skip those.
message CareSchedule {
  // 1..12
  int32 month = 1;
  // care kind label (e.g. "watering", "fertilize", "pruning") → cadence
  // in days. Negative values mean "no action this month".
  map<string, int32> care_list = 2;
}

// A single titled care tip (gardening blurb). Returned by diagnose
// + identify alike; provider-agnostic.
message Tip {
  // short, prompt-style title
  optional string title = 1;
  // markdown body content
  string content = 2;
  // priority hint when the provider sorted them (lower = more important)
  optional int32 priority = 3;
  // stable id when the provider exposes one (lets the UI cache)
  optional string id = 4;
}

// Weather + climate context for the caller's location. Drives whether
// the user should water more (hot, dry) or less (rainy season), and
// surfaces gardening cues (hardiness zone, Köppen climate code).
message WeatherRequest {
  // user latitude (WGS84) — required
  double latitude = 1;
  // user longitude (WGS84) — required
  double longitude = 2;
  // ISO country code (default "US")
  optional string country_code = 3;
  // YYYY-MM-DD anchor day for the forecast window (default: today)
  optional string day = 4;
}

message WeatherDay {
  // calendar day (YYYY-MM-DD)
  string day = 1;
  // human-readable conditions (e.g. "Partially cloudy")
  optional string conditions = 2;
  // max temperature for the day, °C
  optional double temperature_max = 3;
  // min temperature for the day, °C
  optional double temperature_min = 4;
  // current / average temperature, °C
  optional double temperature = 5;
  // server-defined weather condition code
  optional int32 condition_code = 6;
  // CDN URL of an icon representing the conditions
  optional string icon_url = 7;
}

message ClimateMonth {
  // month of year (1..12)
  int32 month = 1;
  // historical max temperature for the month, °C
  optional double temperature_max = 2;
  // historical min temperature for the month, °C
  optional double temperature_min = 3;
  // historical average temperature for the month, °C
  optional double temperature_avg = 4;
}

message WeatherResult {
  // 9-day forecast window — typically 7 days history + today + tomorrow
  repeated WeatherDay forecast = 1;
  // monthly climatological averages (12 entries)
  repeated ClimateMonth temperature_year = 2;
  // USDA hardiness zone (e.g. "13a", "7b")
  optional string hardiness_zone = 3;
  // Köppen climate code (e.g. "Aw")
  optional string climate_classification = 4;
  // confidence on the climate classification, 0..100
  optional int32 climate_confidence = 5;
  // server-defined season code (1..N)
  optional int32 season_type = 6;
  // raw JSON envelope (provider-specific extras)
  optional string raw = 7;
}

// Vision domain — image-driven providers (PictureThis-family, EveryScan,
// LensAI, OpenAI Vision, etc.). Category-aware routing in
// `task/mod.rs` filters eligible providers by request `category` when
// the `plant` feature is on, so the same RPC can fan out to the right
// backend (e.g. `category="plant"` → Glority/PictureThis, default → the
// generic-object providers).
service VisionService {
  // Image → identified subject + optional ranked alternatives,
  // characteristics, facts, confusions. Branches on `category`:
  //   - "plant"            → /v5/recognize/identify
  //   - "weed" / "toxic" / "tree" → same plant endpoint (UI filters tags)
  //   - "bird"             → /v5/recognize/other_species_identify (species_type=0)
  //   - "insect"           → /v5/recognize/other_species_identify (species_type=1)
  //   - anything else      → provider-specific generic object scan
  // Carries optional latitude/longitude for climate-aware ranking.
  rpc Scan(ScanRequest) returns (ScanResult);

  // Reverse-image lookup. Returns similar products / videos / recipes /
  // links the provider can match visually. Independent of `Scan`.
  rpc VisualSearch(VisualSearchRequest) returns (DiscoverResult);

  // Free-text product search against the configured shopping endpoint.
  // Provider-agnostic; result shape mirrors `VisualSearch` so a single
  // shopping UI can render either.
  rpc Shopping(ShoppingRequest) returns (ShoppingResult);

  // Caption / describe an image without ranking candidates. Typically
  // routed through an LLM-vision provider (OpenAI / Gemini) for prose
  // output rather than the classifier-shaped `Scan` flow.
  rpc Describe(DescribeRequest) returns (ScanResult);

  // ------------------------------------------------------------------
  // Plant-care follow-up RPCs — only the Glority-family plugins
  // implement these. Each requires a session token minted by Scan;
  // task executors auto-mint when the cache is cold (see Weather's
  // 2-phase login→fetch executor). Carry latitude/longitude when the
  // backend conditions output on local climate.
  // ------------------------------------------------------------------

  // Watering recommendation: water amount (mL), cadence (days), care
  // category. Falls back to a default "I don't know my pot" branch
  // when `settings` is omitted.
  rpc WaterCalc(WaterCalcRequest) returns (WaterCalcResult);

  // Repotting guidance: is the species repottable, was a pot visible
  // in the image, and structured how-to-repot topics (preparation,
  // tools, FAQ). `plant_name` is substituted into the markdown blurbs
  // server-side via `__YOUR_PLANT_NAME__`.
  rpc RepottingChecker(RepottingCheckerRequest) returns (RepottingCheckerResult);

  // On-device light meter classification. PictureThis routes this
  // inline (no server endpoint) — Rust maps a brightness reading to
  // a 3-bucket label (Low light / Medium light / Bright light).
  rpc LightMeter(LightMeterRequest) returns (LightMeterResult);

  // Plant disease diagnosis: detected diseases with causes / treatments
  // / bounding boxes, scene classification, 12-month care schedule,
  // seasonal tips, plus the provider's typed `plant_id` for chaining
  // follow-up calls (insight / health card / repot).
  rpc Diagnose(DiagnoseRequest) returns (DiagnoseResult);

  // 9-day forecast + 12-month historical climatology + USDA hardiness
  // zone + Köppen climate code for the caller's location. Drives the
  // climate-aware ranking on `Scan`/`Diagnose`/`WaterCalc`. Executor
  // mints a guest session inline if none is cached.
  rpc Weather(WeatherRequest) returns (WeatherResult);
}

